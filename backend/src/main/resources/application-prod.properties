spring.h2.console.enabled=false

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# CORS — env var wins (deploy script sets the live Cloud Run URL once known);
# fallback wildcard covers any *.a.run.app subdomain so first deploys work without
# a redeploy round-trip. JWT remains the real auth boundary.
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:https://*.a.run.app}

# Seeded admin password — required in prod. No default; container fails fast if missing.
app.seed.admin-password=${ADMIN_SEED_PASSWORD}
