# Server — honor Cloud Run's $PORT env var when present; default 8080 keeps local docker / bootRun unchanged.
server.port=${PORT:8080}

# Active profile — 'local' loads application-local.properties (gitignored, holds JWT_SECRET for dev).
# Override via SPRING_PROFILES_ACTIVE env var in CI/production.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# JWT — set in application-local.properties for dev, or via JWT_SECRET env var in production.
app.jwt.secret=${JWT_SECRET}

# Card encryption — AES-256 key (base64-encoded 32 bytes). Set in application-local.properties for dev.
app.card.encryption.key=${CARD_ENCRYPTION_KEY}

# CORS — comma-separated allowed origin patterns. Default covers Vite dev servers on any localhost port.
# Override in application-{profile}.properties or via APP_CORS_ALLOWED_ORIGIN_PATTERNS env var.
app.cors.allowed-origin-patterns=http://localhost:*

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:gymratdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Initialize data.sql after schema creation
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
